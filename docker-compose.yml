version: '3.8'

services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=admin
      - MONGODB_INITDB_ROOT_PASSWORD=adminpassword
    volumes:
      - mongodb_data:/data/db
      - mongodb_configdb:/data/configdb
      - mongodb_mongot:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-network

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4jpassword
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4jpassword", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - platform-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${PORT_BACKEND:-8000}:8000"
    environment:
      - ENVIRONMENT=development
      - MONGO_URI=mongodb://admin:adminpassword@mongodb:27017/?authSource=admin
      - MONGO_DB_NAME=mitre_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4jpassword
      - LLM_API_BASE=http://host.docker.internal:1234/v1
      - LLM_MODEL_NAME=nomic-ai/nomic-embed-text-v1.5-GGUF
      - USE_LOCAL_EMBEDDING_FALLBACK=true
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - platform-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-8080}:8080"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - platform-network

volumes:
  mongodb_data:
  mongodb_configdb:
  mongodb_mongot:
  neo4j_data:
  neo4j_logs:

networks:
  platform-network:
    driver: bridge
